version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # ESLint 10 dropped context.getFilename(), which the eslint-plugin-react
      # bundled by eslint-config-next still calls — linting crashes. Hold at 9
      # until eslint-config-next ships a compatible plugin.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # TypeScript 6 is a breaking major; defer until a deliberate migration pass.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
